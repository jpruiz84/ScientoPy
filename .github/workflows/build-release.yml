name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/test_unit.py -v

      - name: Run behavioral tests
        run: python tests/run_behavioral_tests.py

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            artifact_ext: zip
          - os: ubuntu-22.04
            platform: linux-x64
            artifact_ext: tar.gz
          - os: macos-14
            platform: macos-arm64
            artifact_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libegl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0

      - name: Build with PyInstaller
        run: pyinstaller ScientoPyGui.spec --noconfirm

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ScientoPyGui/* -DestinationPath ScientoPy-${{ matrix.platform }}.zip

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf ScientoPy-${{ matrix.platform }}.tar.gz -C dist ScientoPyGui

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist && zip -r ../ScientoPy-${{ matrix.platform }}.zip ScientoPyGui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScientoPy-${{ matrix.platform }}
          path: ScientoPy-${{ matrix.platform }}.${{ matrix.artifact_ext }}

  sign-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ScientoPy-windows-x64
          path: unsigned

      - name: Upload unsigned artifact for signing
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: ScientoPy-windows-x64-unsigned
          path: unsigned/ScientoPy-windows-x64.zip

      # SignPath code signing — requires SIGNPATH_API_TOKEN secret and
      # organization/project setup at https://signpath.io
      # To enable: add these secrets to the GitHub repository settings:
      #   - SIGNPATH_API_TOKEN
      #   - SIGNPATH_ORGANIZATION_ID
      #   - SIGNPATH_PROJECT_SLUG
      #   - SIGNPATH_SIGNING_POLICY_SLUG
      - name: Sign with SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

      - name: Upload signed artifact
        if: steps.signpath.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ScientoPy-windows-x64-signed
          path: signed/ScientoPy-windows-x64.zip

      # If signing is not configured, pass through the unsigned artifact
      - name: Pass through unsigned artifact
        if: steps.signpath.outcome == 'skipped' || steps.signpath.outcome == ''
        uses: actions/upload-artifact@v4
        with:
          name: ScientoPy-windows-x64-signed
          path: unsigned/ScientoPy-windows-x64.zip

  release:
    needs: [build, sign-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download signed Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ScientoPy-windows-x64-signed
          path: artifacts/ScientoPy-windows-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ScientoPy-linux-x64
          path: artifacts/ScientoPy-linux-x64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ScientoPy-macos-arm64
          path: artifacts/ScientoPy-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
