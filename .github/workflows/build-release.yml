name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/test_unit.py -v

      - name: Run behavioral tests
        run: python tests/run_behavioral_tests.py

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-22.04
            platform: linux-x64
          - os: macos-14
            platform: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libegl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0

      - name: Build with PyInstaller
        run: pyinstaller ScientoPyGui.spec --noconfirm

      # Windows: upload the directory directly so GitHub creates the artifact
      # ZIP from the raw files. This avoids a double-ZIP layer that would
      # prevent SignPath from finding ScientoPyGui.exe inside.
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ScientoPy-${{ matrix.platform }}
          path: dist/ScientoPyGui/

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ScientoPy-${{ matrix.platform }}.tar.gz -C dist ScientoPyGui

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../ScientoPy-${{ matrix.platform }}.zip ScientoPyGui

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ScientoPy-${{ matrix.platform }}
          path: ScientoPy-${{ matrix.platform }}.*

  sign-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      # Download the build artifact (extracts files into unsigned/).
      # Then re-upload the directory — not a pre-made ZIP — so GitHub creates
      # a single-layer ZIP with ScientoPyGui.exe at the root. Uploading a
      # file would double-wrap it (GitHub ZIP → our ZIP) and hide the exe
      # from the SignPath artifact configuration.
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ScientoPy-windows-x64
          path: unsigned

      - name: Re-upload as directory for SignPath
        id: upload-for-signing
        uses: actions/upload-artifact@v4
        with:
          name: ScientoPy-windows-x64-for-signing
          path: unsigned/

      # SignPath code signing (OSS Foundation program).
      # Required GitHub repository secrets:
      #   SIGNPATH_API_TOKEN              — API token from SignPath dashboard
      #   SIGNPATH_ORGANIZATION_ID        — SignPath organization ID (UUID)
      #   SIGNPATH_PROJECT_SLUG           — project slug set in SignPath (e.g. "ScientoPy")
      #   SIGNPATH_ARTIFACT_CONFIG_SLUG   — artifact configuration slug (e.g. "initial-version")
      #   SIGNPATH_SIGNING_POLICY_SLUG    — signing policy slug (e.g. "test-signing")
      #
      # Artifact configuration: .signpath/artifact-configuration.xml
      - name: Sign with SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-for-signing.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      # SignPath extracts the signed files into signed/. Repackage as a ZIP
      # so the release asset has the same format as Linux/macOS.
      - name: Package signed artifact
        run: cd signed && zip -r ../ScientoPy-windows-x64.zip . && cd ..

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScientoPy-windows-x64-signed
          path: ScientoPy-windows-x64.zip

  release:
    needs: [build, sign-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download signed Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ScientoPy-windows-x64-signed
          path: artifacts/ScientoPy-windows-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ScientoPy-linux-x64
          path: artifacts/ScientoPy-linux-x64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ScientoPy-macos-arm64
          path: artifacts/ScientoPy-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
